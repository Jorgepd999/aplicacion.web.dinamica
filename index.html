<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>AWDG - Gestión de Tareas</title>
    <link rel="stylesheet" href="css/estilo.css">

</head>

<body>
    <h1>Gestión de Tareas</h1>
    <button id="toggleTheme">Modo Oscuro</button>

    <!-- Formulario para crear nuevas tareas -->
    <form id="taskForm">
        <input type="text" id="taskName" placeholder="Nombre de la tarea" required>
        <button type="submit">Añadir Tarea</button>
    </form>

    <!-- Campo para buscar tareas -->
    <input type="text" id="searchTask" placeholder="Buscar tarea">

    <!-- Lista de tareas -->
    <ul id="taskList"></ul>

    <!-- Importar scripts -->
    <script src="js/taskManager.js"></script>
    <script src="js/app.js"></script>
    <script src="js/modoVista.js"></script>
</body>

</html>
