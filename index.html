<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>AWDG - Gestión de Tareas</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>

<body>
    <!-- Contenedor principal -->
    <div class="header">
        <h1>Gestión de Tareas</h1>

        <!-- Botón para cambiar entre modo oscuro y claro -->
        <button id="botonModo">Modo Oscuro</button>
    </div>

    <!-- Formulario para añadir tareas -->
    <form id="formularioTarea">
        <input type="text" id="nombreTarea" placeholder="Nombre de la tarea" required>
        <button type="submit">Añadir Tarea</button>
    </form>

    <!-- Campo para buscar tareas (debajo del formulario) -->
    <input type="text" id="buscarTarea" placeholder="Buscar tarea">
    

    <!-- Lista de tareas -->
    <ul id="listaTareas"></ul>

    <!-- Scripts -->
    <script src="js/gestorTareas.js"></script>
    <script src="js/interfazTareas.js"></script>
    <script src="js/modoOscuro.js"></script>
</body>

</html>
